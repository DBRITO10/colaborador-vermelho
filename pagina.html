<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel - Móveis Simonetti</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --primary: #d32f2f;      /* Vermelho destaque */
            --bg-body: #fdf2f2;      /* ALTERADO: Tom rosado bem suave */
            --bg-card: #ffffff;     /* Branco */
            --text-dark: #333333;   /* Texto legível */
            --border: #f0d8d8;       /* DICA: Deixe a borda levemente rosada também */
            --gray-text: #777777;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-body);
            min-height: 100vh;
            color: var(--text-dark);
            overflow-x: hidden;
        }

        /* Barra Superior */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
        }

        .logo-area { display: flex; align-items: center; gap: 15px; }

        .btn-back-portal {
            color: var(--primary);
            text-decoration: none;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            transition: 0.3s;
        }
        .btn-back-portal:hover { opacity: 0.7; }

        .logo-area i { font-size: 1.4rem; color: var(--primary); }
        .logo-area h1 { margin: 0; font-size: 1rem; color: var(--text-dark); text-transform: uppercase; }

        .user-controls { display: flex; align-items: center; gap: 10px; }

        .user-badge {
            background: #eee;
            padding: 5px 12px;
            border-radius: 20px;
            color: var(--text-dark);
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-logout {
            background: var(--primary);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .welcome-section { text-align: center; margin: 40px auto 30px auto; }
        .welcome-section h2 { font-size: 1.6rem; color: var(--text-dark); margin: 0; }
        .welcome-section p { color: var(--gray-text); font-size: 1rem; margin-top: 5px; }

        .main-container { max-width: 1100px; margin: 0 auto 50px auto; padding: 0 15px; }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 25px 15px;
            text-align: center;
            text-decoration: none;
            color: var(--text-dark);
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            position: relative;
        }

        .card:hover { border-color: var(--primary); transform: translateY(-3px); }
        .card i { font-size: 2.2rem; margin-bottom: 12px; color: var(--primary); }
        .card h3 { margin: 5px 0; font-size: 1.1rem; }
        .card p { font-size: 0.8rem; color: var(--gray-text); height: 40px; margin: 5px 0; }

        .card-action {
            margin-top: 15px;
            background: var(--primary);
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .card.locked { opacity: 0.5; cursor: not-allowed; }
        .lock-icon { position: absolute; top: 10px; right: 10px; color: #999; }

        .footer { text-align: center; padding: 20px; color: var(--gray-text); font-size: 0.75rem; }

        /* PWA Install Button */
        #pwa-install-container { display: none; text-align: center; margin-top: 40px; }
        #btnInstall {
            background: var(--primary);
            border: none;
            padding: 12px 25px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <header class="top-bar">
        <div class="logo-area">
            <i class="fas fa-warehouse"></i>
            <h1>PAGINA INICIAL</h1>
        </div>
        
        <div class="user-controls">
            <div class="user-badge">
                <i class="fas fa-user-circle"></i>
                <span id="userDisplay">...</span>
            </div>
            <button class="btn-logout" id="btnLogout">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>
    </header>

    <div class="welcome-section">
        <h2>PAINEL DE CONTROLE</h2>
        <p>Selecione o módulo que deseja acessar.</p>
    </div>

    <main class="main-container">
        <div class="cards-grid">
            <a href="estoque.html" class="card">
                <i class="fas fa-boxes-stacked"></i>
                <h3>MOVIMENTAÇÃO</h3>
                <p>Visualização de endereços e volumes.</p>
                <div class="card-action">Acessar</div>
            </a>

            <a href="produtos.html" class="card">
                <i class="fas fa-tags"></i>
                <h3>CADASTRO</h3>
                <p>Entrada e criação de novos SKUs.</p>
                <div class="card-action">Acessar</div>
            </a>
        </div>

        <div id="pwa-install-container">
            <button id="btnInstall">
                <i class="fas fa-download"></i> INSTALAR APLICATIVO
            </button>
        </div>
    </main>

    <footer class="footer">
        &copy; 2026 Móveis Simonetti - Developed by DB.
    </footer>

    <script type="module">
        import { db, auth } from "./js/firebase-config.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        onAuthStateChanged(auth, async user => {
            if (user) {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    document.getElementById("userDisplay").innerText = userDoc.data().nomeCompleto || "Usuário";
                }
            } else { window.location.href = "index.html"; }
        });

        document.getElementById("btnLogout").onclick = () => auth.signOut().then(() => window.location.href = "index.html");

        // PWA Install Logic
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('pwa-install-container').style.display = 'block';
        });

        document.getElementById('btnInstall')?.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt = null;
                document.getElementById('pwa-install-container').style.display = 'none';
            }
        });
    </script>
</body>
</html>
