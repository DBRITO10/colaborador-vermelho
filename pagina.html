<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina - Móveis Simonetti</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --primary: #004a99;
            --white: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-color: #ffffff;
            --danger: #ff4d4d;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #002d5f 0%, #004a99 100%);
            background-attachment: fixed;
            min-height: 100vh;
            color: var(--text-color);
            overflow-x: hidden;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-area i {
            font-size: 1.4rem;
            color: #ffab00;
        }

        .logo-area h1 {
            margin: 0;
            font-size: 1rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .user-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-badge {
            background: var(--glass-bg);
            padding: 5px 12px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            white-space: nowrap; 
        }

        .btn-logout {
            background: var(--danger);
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.8rem;
        }

        .btn-logout:hover { background: #cc0000; }

        .welcome-section {
            text-align: center;
            margin: 30px auto 20px auto;
        }

        .welcome-section h2 {
            font-size: 1.8rem;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .welcome-section p {
            opacity: 0.9;
            font-size: 1rem;
            margin-top: 5px;
        }

        .main-container {
            max-width: 1100px;
            margin: 0 auto 50px auto;
            padding: 0 15px;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 20px 15px;
            text-align: center;
            text-decoration: none;
            color: white;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.2);
        }

        .card i {
            font-size: 2.2rem;
            margin-bottom: 12px;
            color: #ffab00;
        }

        .card h3 {
            margin: 5px 0;
            font-size: 1.1rem;
        }

        .card p {
            font-size: 0.8rem;
            opacity: 0.8;
            margin: 5px 0;
            height: 40px; 
            display: flex;
            align-items: center;
        }

        .card-action {
            margin-top: 10px;
            background: var(--white);
            color: var(--primary);
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .card.locked { opacity: 0.5; cursor: not-allowed; }
        .lock-icon { position: absolute; top: 10px; right: 10px; font-size: 1rem !important; opacity: 0.5; }

        .footer { text-align: center; padding: 20px; font-size: 0.75rem; opacity: 0.6; }

        @media (max-width: 480px) {
            .logo-area h1 { display: none; } 
            .welcome-section h2 { font-size: 1.5rem; }
            .cards-grid { grid-template-columns: 1fr; }
        }
        
        #pwa-install-container {
            display: none; 
            text-align: center;
            margin-top: 40px;
            margin-bottom: 20px;
        }

        #btnInstall {
            background: linear-gradient(45deg, #ffab00, #ff8000);
            border: none;
            padding: 15px 30px;
            border-radius: 20px;
            color: #002d5f;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 15px;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <header class="top-bar">
        <div class="logo-area">
            <i class="fas fa-warehouse"></i>
            <h1>PAGINA INICIAL</h1>
        </div>
        
        <div class="user-controls">
            <div class="user-badge" id="userBadge">
                <i class="fas fa-user-circle"></i>
                <span id="userDisplay">...</span>
            </div>
            <button class="btn-logout" id="btnLogout" title="Sair do sistema">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>
    </header>

    <div class="welcome-section">
        <h2>PAINEL DE CONTROLE</h2>
        <p>Selecione o módulo que deseja acessar.</p>
    </div>

    <main class="main-container">
        <div class="cards-grid">
            <a href="estoque.html" class="card" id="cardEstoque">
                <i class="fas fa-boxes-stacked"></i>
                <h3>ESTOQUE 600</h3>
                <p>Visualização de endereços e volumes.</p>
                <div class="card-action">Acessar</div>
            </a>

            <a href="produtos.html" class="card" id="cardProdutos">
                <i class="fas fa-tags"></i>
                <h3>CONTROLE</h3>
                <p>Cadastro e criação de novos SKUs.</p>
                <div class="card-action">Acessar</div>
            </a>
        </div>

        <div id="pwa-install-container">
            <button id="btnInstall">
                <i class="fas fa-download"></i>
                <span>INSTALAR APLICATIVO</span>
            </button>
        </div>
    </main>

    <footer class="footer">
        &copy; 2026 Móveis Simonetti - Developed by DB.
    </footer>

    <script type="module">
        import { db, auth } from "./js/firebase-config.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        onAuthStateChanged(auth, async user => {
            if (user) {
                try {
                    const userDoc = await getDoc(doc(db, "users", user.uid));
                    if (!userDoc.exists()) { window.location.href = "first_login.html"; return; }

                    const userData = userDoc.data();
                    const userRole = (userData.role || "leitor").toLowerCase();
                    const nomeComp = userData.nomeCompleto || "Usuário";

                    document.getElementById("userDisplay").innerText = nomeComp;

                    if (userRole === "admin") {
                        document.getElementById("btnGestao").style.display = "flex";
                    }

                    const cards = {
                        fornecedores: document.getElementById("cardFornecedores"),
                        historico: document.getElementById("cardHistorico")
                    };

                    const bloquear = (card) => {
                        if(!card) return;
                        card.classList.add("locked");
                        card.innerHTML += '<i class="fas fa-lock lock-icon"></i>';
                        card.onclick = (e) => { e.preventDefault(); alert("Acesso negado."); };
                        card.querySelector(".card-action").innerText = "Bloqueado";
                    };

                    if (userRole === "leitor" || userRole === "operador") {
                        bloquear(cards.fornecedores);
                        bloquear(cards.historico);
                    }
                } catch (e) { console.error(e); }
            } else { window.location.href = "index.html"; }
        });

        document.getElementById("btnLogout").onclick = () => {
            auth.signOut().then(() => { window.location.href = "index.html"; });
        };
        
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            const installBtnContainer = document.getElementById('pwa-install-container');
            if(installBtnContainer) installBtnContainer.style.display = 'block';
        });

        document.getElementById('btnInstall')?.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    document.getElementById('pwa-install-container').style.display = 'none';
                }
                deferredPrompt = null;
            }
        });
    </script>
</body>
</html>
