<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel - Móveis Simonetti</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/pagina.css">
</head>
<body>

    <header class="top-bar">
        <div class="logo-area">
            <i class="fas fa-warehouse"></i>
            <h1>PAGINA INICIAL</h1>
        </div>
        
        <div class="user-controls">
            <div class="user-badge">
                <i class="fas fa-user-circle"></i>
                <span id="userDisplay">...</span>
            </div>
            <button class="btn-logout" id="btnLogout">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>
    </header>

    <div class="welcome-section">
        <h2>PAINEL DE CONTROLE</h2>
        <p>Selecione o módulo que deseja acessar.</p>
    </div>

    <main class="main-container">
        <div class="cards-grid">
            <a href="estoque.html" class="card">
                <i class="fas fa-boxes-stacked"></i>
                <h3>MOVIMENTAÇÃO</h3>
                <p>Visualização de endereços e volumes.</p>
                <div class="card-action">Acessar</div>
            </a>

            <a href="produtos.html" class="card">
                <i class="fas fa-tags"></i>
                <h3>CADASTRO</h3>
                <p>Entrada e criação de novos SKUs.</p>
                <div class="card-action">Acessar</div>
            </a>
        </div>

        <div id="pwa-install-container">
            <button id="btnInstall">
                <i class="fas fa-download"></i> INSTALAR APLICATIVO
            </button>
        </div>
    </main>

    <footer class="footer">
        &copy; 2026 Móveis Simonetti - Developed by DB.
    </footer>

    <script type="module" src="js/pagina.js"></script>
</body>
</html>
