<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simonetti - Gestão de Produtos</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="css/produtos.css">
</head>
<body>

<nav class="top-nav">
    <div style="display:flex; align-items:center; gap:10px;">
      <a href="pagina.html" style="color: white; text-decoration: none; margin-right: 15px; font-size: 1.1rem;">
        <i class="fas fa-arrow-left"></i>
      </a>
      <i class="fas fa-boxes fa-lg"></i>
      <span style="font-weight:bold; letter-spacing:1px;">ESTOQUE 600</span>
    </div>
    <div style="display:flex; align-items:center; gap:20px;">
      <div id="userDisplay" style="font-size:0.9rem;"></div>
      <button onclick="window.logout()" class="btn-action" style="background:var(--danger)">SAIR</button>
    </div>
  </nav>

  <div class="container">
    <div class="glass-panel">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2 style="margin:0; color:var(--primary); font-size:1.4rem;">Cadastro de Volumes</h2>
        <button id="btnAbrirModalProd" onclick="window.modalNovoProduto()" class="btn-action" style="background:var(--success); display:none;">+ NOVO PRODUTO</button>
      </div>
      
      <div class="filter-grid">
        <select id="filtroForn" onchange="window.filtrar()"><option value="">Fornecedor...</option></select>
        <input type="text" id="filtroCod" placeholder="SKU / Código" onkeyup="window.filtrar()">
        <input type="text" id="filtroDesc" placeholder="Descrição" onkeyup="window.filtrar()">
        <button onclick="window.limparFiltros()" class="btn-action" style="background:var(--gray)"><i class="fas fa-sync"></i></button>
      </div>
    </div>

    <div class="glass-panel table-responsive" style="padding: 0;">
      <table>
        <thead>
          <tr>
            <th style="width: 40px;"></th>
            <th>FORNECEDOR</th>
            <th>CÓDIGO</th>
            <th>PRODUTO MASTER</th>
            <th style="text-align: center;">TOTAL</th>
            <th style="text-align: right; padding-right: 20px;">AÇÕES</th>
          </tr>
        </thead>
        <tbody id="tblEstoque"></tbody>
      </table>
    </div>
  </div>

  <div id="modalMaster" class="modal">
    <div class="modal-content">
      <h3 id="modalTitle" style="margin-top: 0; color: var(--primary);">Título</h3>
      <div id="modalBody"></div>
      <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:20px;">
        <button onclick="window.fecharModal()" class="btn-action" style="background:#eee; color:#333;">FECHAR</button>
        <button id="btnModalConfirm" class="btn-action" style="background:var(--primary);">CONFIRMAR</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/produtos.js"></script>
</body>
</html>
