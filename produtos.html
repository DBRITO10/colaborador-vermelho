<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simonetti - Gestão de Produtos</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root {
      --primary: #004a99; --glass: rgba(255, 255, 255, 0.9);
      --danger: #ff4d4d; --success: #00c853; --gray: #6c757d; --warning: #ffab00; --info: #17a2b8;
    }
    body { 
      background: linear-gradient(135deg, #001f3f 0%, #004a99 100%);
      background-attachment: fixed; margin: 0; font-family: 'Segoe UI', sans-serif; 
      color: #333; min-height: 100vh;
    }
    .top-nav { 
      background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(15px);
      padding: 10px 20px; display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.1); color: white;
    }
    .container { padding: 20px; max-width: 1200px; margin: auto; }
    .glass-panel { 
      background: var(--glass); backdrop-filter: blur(10px); 
      border-radius: 12px; padding: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); margin-bottom: 20px;
    }
    .filter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; align-items: flex-end; }
    .filter-group { display: flex; flex-direction: column; gap: 5px; }
    .filter-group label { font-size: 0.75rem; font-weight: bold; color: var(--primary); }
    input, select { padding: 10px; border: 1px solid #ddd; border-radius: 6px; outline: none; }
    
    table { width: 100%; border-collapse: collapse; background: white; }
    th { background: #f8f9fa; padding: 12px; text-align: left; font-size: 0.85rem; color: #666; border-bottom: 2px solid #eee; }
    td { padding: 12px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
    
    .child-row { background: #fdfdfd; display: none; }
    .child-row.active { display: table-row; }
    
    .btn-action { 
      padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; 
      color: white; font-weight: bold; font-size: 0.75rem; transition: 0.2s;
    }
    .btn-action:hover { opacity: 0.8; transform: translateY(-1px); }

    .modal { 
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; 
    }
    .modal-content { background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 450px; }
    .modal-content input, .modal-content select { width: 100%; margin-bottom: 15px; box-sizing: border-box; }

    /* --- AJUSTE PARA CELULAR (Rolar lateralmente) --- */
    @media (max-width: 768px) {
      .table-responsive {
        overflow-x: auto !important;
        -webkit-overflow-scrolling: touch;
      }
      table {
        min-width: 800px; /* Garante que a tabela não "esmague" e force o scroll */
      }
    }
  </style>
</head>
<body>

<nav class="top-nav">
    <div style="display:flex; align-items:center; gap:10px;">
      <a href="pagina.html" style="color: white; text-decoration: none; margin-right: 15px; font-size: 1.1rem;">
        <i class="fas fa-arrow-left"></i>
      </a>
      <i class="fas fa-boxes fa-lg"></i>
      <span style="font-weight:bold; letter-spacing:1px;">ESTOQUE 600</span>
    </div>
    <div style="display:flex; align-items:center; gap:20px;">
      <div id="userDisplay" style="font-size:0.9rem;"></div>
      <button onclick="window.logout()" class="btn-action" style="background:var(--danger)">SAIR</button>
    </div>
  </nav>

  <div class="container">
    <div class="glass-panel">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2 style="margin:0; color:var(--primary); font-size:1.4rem;">Pulmão de Peças</h2>
        <button id="btnAbrirModalProd" onclick="window.modalNovoProduto()" class="btn-action" style="background:var(--success); display:none;">+ NOVO PRODUTO</button>
      </div>
      
      <div class="filter-grid">
        <select id="filtroForn" onchange="window.filtrar()"><option value="">Fornecedor...</option></select>
        <input type="text" id="filtroCod" placeholder="SKU / Código" onkeyup="window.filtrar()">
        <input type="text" id="filtroDesc" placeholder="Descrição" onkeyup="window.filtrar()">
        <button onclick="window.limparFiltros()" class="btn-action" style="background:var(--gray)"><i class="fas fa-sync"></i></button>
      </div>
    </div>

    <div class="glass-panel table-responsive" style="padding: 0;">
      <table>
        <thead>
          <tr>
            <th style="width: 40px;"></th>
            <th>FORNECEDOR</th>
            <th>CÓDIGO</th>
            <th>PRODUTO MASTER</th>
            <th style="text-align: center;">TOTAL</th>
            <th style="text-align: right; padding-right: 20px;">AÇÕES</th>
          </tr>
        </thead>
        <tbody id="tblEstoque"></tbody>
      </table>
    </div>
  </div>

  <div id="modalMaster" class="modal">
    <div class="modal-content">
      <h3 id="modalTitle" style="margin-top: 0; color: var(--primary);">Título</h3>
      <div id="modalBody"></div>
      <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:20px;">
        <button onclick="window.fecharModal()" class="btn-action" style="background:#eee; color:#333;">FECHAR</button>
        <button id="btnModalConfirm" class="btn-action" style="background:var(--primary);">CONFIRMAR</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/produtos.js"></script>
</body>
</html>
