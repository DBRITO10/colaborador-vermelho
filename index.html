<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simonetti - Gestão de Estoque</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-container">
        <h2>GESTÃO DE ESTOQUE</h2>
        <span class="subtitle" style="color: #7f8c8d; font-size: 14px; margin-bottom: 30px; display: block;">Acessar Sistema</span>
        
        <div class="input-group">
            <input type="email" id="email" placeholder="Seu E-mail" required autocomplete="email">
        </div>
        
        <div class="input-group">
            <input type="password" id="password" placeholder="Sua senha" required>
        </div>
        
        <button id="btnLogin">ENTRAR</button>
        
        <p id="error"></p>

        <div class="footer-text" style="margin-top: 30px; font-size: 12px; color: #7f8c8d; border-top: 1px solid #eee; padding-top: 20px;">
            &copy; 2026 Móveis Simonetti<br>Developed by DB ®
        </div>
    </div>

    <script type="module" src="js/login.js"></script>
</body>
</html>
